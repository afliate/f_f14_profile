<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 캐릭터 시트 제작기</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; }
body { margin: 0; background: #1a1a1a; color: white; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }

/* 패널 설정 */
.panel { width: 300px; min-width: 300px; padding: 15px; background: #111; border-right: 1px solid #222; overflow-y: auto; height: 100vh; }
.section { margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid #222; }
.section h3 { font-size: 11px; opacity: 0.5; margin-bottom: 8px; text-transform: uppercase; }
.field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 8px; }
.field input { width: 100%; padding: 5px; background: #222; border: 1px solid #333; color: white; }

/* 직업 아이콘 (패널) */
.job-icon { width: 28px; height: 28px; cursor: pointer; filter: invert(1); opacity: 0.4; margin: 2px; }
.job-icon.selected { opacity: 1; outline: 2px solid white; }
.job-icon.main-selected { opacity: 1; outline: 2px solid #f5c518; }

/* 라인아트 선택기 */
.la-item { width: 45px; height: 45px; cursor: pointer; filter: invert(1); border: 1px solid #333; margin: 2px; }
.la-item:hover { background: #333; }

/* 카드 디자인 (세로형 기준) */
.preview-container { flex: 1; display: flex; justify-content: center; align-items: center; background: #222; overflow: hidden; }
#previewWrapper { transform-origin: center; }
#card { background: #000; position: relative; overflow: hidden; }
#card.vertical { width: 1080px; height: 1920px; }
#card.horizontal { width: 1920px; height: 1080px; }

#bgImage { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; cursor: grab; }

/* 카드 내 정보 배치 */
.info-layer { position: absolute; width: 100%; height: 100%; z-index: 10; pointer-events: none; padding: 60px; display: flex; flex-direction: column; justify-content: flex-end; }
#nameDisplay { font-size: 150px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
#serverDisplay { font-size: 40px; color: #f5c518; letter-spacing: 5px; }

#jobDisplay { display: flex; gap: 15px; margin-top: 20px; }
.card-job-icon { width: 80px; height: 80px; filter: invert(1); }
.card-job-icon.main { outline: 4px solid #f5c518; outline-offset: 5px; }

/* 라인아트 (카드 안) */
#lineArt { position: absolute; right: -50px; bottom: -50px; width: 900px; opacity: 0.2; filter: brightness(0) invert(1); pointer-events: none; z-index: 5; }

.layout-btn { padding: 8px; background: #222; color: white; border: 1px solid #444; cursor: pointer; flex: 1; }
.layout-btn.active { background: white; color: black; }
</style>
</head>
<body>

<div class="panel">
  <h2>FF14 제작기</h2>
  
  <div class="section">
    <h3>레이아웃</h3>
    <div style="display:flex; gap:5px;">
      <button class="layout-btn active" onclick="setLayout('vertical', this)">세로형</button>
      <button class="layout-btn" onclick="setLayout('horizontal', this)">가로형</button>
    </div>
  </div>

  <div class="section">
    <h3>기본 정보</h3>
    <div class="field"><label>닉네임</label><input type="text" id="nameInput" oninput="updateCard()" placeholder="NAME"></div>
    <div class="field"><label>서버</label><input type="text" id="serverInput" oninput="updateCard()" placeholder="서버"></div>
    <div class="field"><label>데이터센터</label><input type="text" id="dcInput" oninput="updateCard()" placeholder="빈칸 가능"></div>
  </div>

  <div class="section">
    <h3>배경 이미지</h3>
    <input type="file" accept="image/*" onchange="loadBgImage(event)">
  </div>

  <div class="section">
    <h3>라인아트 선택</h3>
    <div id="laPicker" style="display:flex; flex-wrap:wrap; background:#000; padding:5px;"></div>
  </div>

  <div class="section">
    <h3>직업 선택</h3>
    <div id="jobPicker" style="display:flex; flex-wrap:wrap;"></div>
  </div>

  <div class="section">
    <button onclick="saveImage()" style="width:100%; padding:10px; cursor:pointer;">이미지 저장</button>
  </div>
</div>

<div class="preview-container">
  <div id="previewWrapper">
    <div id="card" class="vertical">
      <img id="bgImage" src="">
      <img id="lineArt" src="" style="display:none;">
      <div class="info-layer">
        <div id="nameDisplay">CHARACTER</div>
        <div id="serverDisplay">SERVER</div>
        <div id="jobDisplay"></div>
      </div>
    </div>
  </div>
</div>

<script>
const jobs = ["pld","war","drk","gnb","whm","sch","ast","sge","mnk","drg","nin","sam","rpr","vpr","brd","mch","dnc","blm","smn","rdm","pct"];
// 깃허브 Raw 경로 설정 (중요)
const rawBase = "https://raw.githubusercontent.com/afliate/f_f14_profile/main/images/jobs/";

let selectedJobs = [];
let bgPosX = 50, bgPosY = 50;

function init() {
  // 라인아트 목록 생성
  const laPicker = document.getElementById("laPicker");
  laPicker.innerHTML = jobs.map(j => `
    <img src="${rawBase}CL/${j.toUpperCase()}.png" class="la-item" onclick="setLineArt('${j.toUpperCase()}')">
  `).join("");

  // 직업 아이콘 선택지 생성
  const jobPicker = document.getElementById("jobPicker");
  jobPicker.innerHTML = jobs.map(j => `
    <img src="${rawBase}ffxivjobssvg/${j}.svg" class="job-icon" id="target-${j}" onclick="toggleJob('${j}')">
  `).join("");

  fitPreview();
}

function toggleJob(job) {
  const idx = selectedJobs.indexOf(job);
  if (idx > -1) selectedJobs.splice(idx, 1);
  else selectedJobs.push(job);
  
  updateJobUI();
  updateCard();
}

function updateJobUI() {
  document.querySelectorAll(".job-icon").forEach(el => {
    const j = el.id.replace("target-", "");
    el.classList.toggle("selected", selectedJobs.includes(j));
    el.classList.toggle("main-selected", selectedJobs[0] === j);
  });
}

function setLineArt(job) {
  const la = document.getElementById("lineArt");
  la.src = `${rawBase}CL/${job}.png`;
  la.style.display = "block";
}

function updateCard() {
  document.getElementById("nameDisplay").innerText = document.getElementById("nameInput").value || "CHARACTER";
  
  const server = document.getElementById("serverInput").value || "SERVER";
  const dc = document.getElementById("dcInput").value;
  // 데이터센터 빈칸 로직
  document.getElementById("serverDisplay").innerText = dc ? `${server} · ${dc}` : server;

  const display = document.getElementById("jobDisplay");
  display.innerHTML = selectedJobs.map((j, idx) => `
    <img src="${rawBase}ffxivjobssvg_meteor/${j}.svg" class="card-job-icon ${idx === 0 ? 'main' : ''}">
  `).join("");
}

function loadBgImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById("bgImage");
    img.src = e.target.result;
    enableDrag(img);
  };
  reader.readAsDataURL(file);
}

function enableDrag(img) {
  let isDragging = false;
  let startX, startY;
  img.onmousedown = e => {
    isDragging = true;
    startX = e.clientX; startY = e.clientY;
  };
  window.onmousemove = e => {
    if (!isDragging) return;
    bgPosX -= (e.clientX - startX) / 10;
    bgPosY -= (e.clientY - startY) / 10;
    img.style.objectPosition = `${bgPosX}% ${bgPosY}%`;
    startX = e.clientX; startY = e.clientY;
  };
  window.onmouseup = () => isDragging = false;
}

function setLayout(mode, btn) {
  const card = document.getElementById("card");
  card.className = mode;
  document.querySelectorAll(".layout-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  fitPreview();
}

function fitPreview() {
  const wrapper = document.getElementById("previewWrapper");
  const container = document.querySelector(".preview-container");
  const card = document.getElementById("card");
  const scale = Math.min((container.clientWidth - 40) / card.offsetWidth, (container.clientHeight - 40) / card.offsetHeight);
  wrapper.style.transform = `scale(${scale})`;
}

function saveImage() {
  html2canvas(document.getElementById("card"), { scale: 2 }).then(canvas => {
    const link = document.createElement("a");
    link.download = "ff14_profile.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

window.onload = init;
window.onresize = fitPreview;
</script>
</body>
</html>
