<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 잡지 커버 카드 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  color: white;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ==========================================
   왼쪽 패널
========================================== */
.panel {
  width: 240px;
  min-width: 240px;
  padding: 14px;
  background: #0e0e0e;
  border-right: 1px solid #1e1e1e;
  overflow-y: auto;
  height: 100vh;
  font-family: sans-serif;
}
.panel-title {
  font-size: 11px;
  margin-bottom: 16px;
  opacity: 0.5;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.section {
  margin-bottom: 12px;
  padding-bottom: 12px;
  border-bottom: 1px solid #1e1e1e;
}
.section h3 {
  font-size: 10px;
  opacity: 0.4;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.field {
  display: flex;
  flex-direction: column;
  gap: 3px;
  margin-bottom: 7px;
}
.field label { font-size: 10px; opacity: 0.5; }
.field input[type="text"],
.field textarea,
.field select {
  width: 100%;
  padding: 5px 7px;
  background: #1a1a1a;
  border: 1px solid #2a2a2a;
  color: white;
  font-size: 12px;
  font-family: sans-serif;
  resize: vertical;
}
.field select option { background: #1a1a1a; }
input[type="file"] { font-size: 11px; color: #888; width: 100%; }
.check-row {
  display: flex; align-items: center; gap: 6px; margin-top: 4px;
}
.check-row input[type="checkbox"] { cursor: pointer; }
.check-row label { font-size: 10px; opacity: 0.5; cursor: pointer; }

/* 직업 */
.job-section-header {
  display: flex; align-items: center;
  justify-content: space-between;
  cursor: pointer; padding: 4px 0; user-select: none;
}
.job-section-header span { font-size: 10px; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.08em; }
.job-section-body.collapsed { display: none; }
.job-category { margin-bottom: 8px; }
.job-title { font-size: 10px; opacity: 0.4; margin-bottom: 5px; }
.job-subrow { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.job-subtitle { width: 34px; font-size: 9px; opacity: 0.4; flex-shrink: 0; }
.job-row { display: flex; flex-wrap: wrap; gap: 3px; }
.job-icon {
  width: 24px; height: 24px;
  cursor: pointer; filter: invert(1);
  opacity: 0.35; transition: opacity 0.1s;
}
.job-icon:hover { opacity: 0.75; }
.job-icon.selected { opacity: 1; outline: 1px solid rgba(255,255,255,0.6); outline-offset: 1px; }

.section button {
  padding: 6px; background: #1a1a1a;
  border: 1px solid #333; color: white;
  cursor: pointer; font-size: 11px; flex: 1;
}
.section button:hover { background: #252525; }
.time-btn {
  padding: 5px 10px; background: #1a1a1a;
  border: 1px solid #333; color: white;
  cursor: pointer; font-size: 11px;
}
.time-btn.active { background: white; color: black; }
.save-btn {
  width: 100%; padding: 8px;
  background: #1a1a1a; border: 1px solid #444;
  color: white; cursor: pointer; font-size: 12px;
}
.save-btn:hover { background: #252525; }

/* ==========================================
   미리보기
========================================== */
.preview-container {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  overflow: hidden;
  padding: 20px;
  background: #0a0a0a;
}
.preview-wrapper { transform-origin: top center; }

/* ==========================================
   카드 본체
========================================== */
.card {
  position: relative;
  overflow: hidden;
  background: #0a0510;
  font-family: 'Noto Sans KR', sans-serif;
}
.card.vertical   { width: 1080px; height: 1920px; }
.card.horizontal { width: 1920px; height: 1080px; }

.card .bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; object-position: center top;
  z-index: 0;
}
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.35) 0%,
    rgba(0,0,0,0.05) 20%,
    transparent 40%,
    rgba(0,0,0,0.4) 70%,
    rgba(0,0,0,0.82) 100%
  );
  z-index: 1; pointer-events: none;
}

/* ── 메인 타이틀 (상단 꽉 차는 큰 글자) ── */
#mainTitle {
  position: absolute;
  top: 0; left: 0; right: 0;
  padding: 18px 40px 0;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 230px; line-height: 0.88; letter-spacing: 4px;
  color: white;
  opacity: 0.92;
  z-index: 10;
  pointer-events: none; user-select: none;
  text-shadow: 2px 4px 20px rgba(0,0,0,0.5);
}

/* ── 상단 날짜 + 바코드 ── */
.card-top {
  position: absolute;
  top: 0; left: 0; right: 0; height: 90px;
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 28px 44px 0;
  z-index: 12;
}
.card-date {
  font-size: 18px; opacity: 0.55;
  letter-spacing: 0.12em;
  font-family: 'Bebas Neue', sans-serif;
}
.barcode-area { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.barcode-svg { width: 90px; height: 32px; }
.barcode-label { font-size: 13px; opacity: 0.35; letter-spacing: 0.08em; font-family: 'Bebas Neue', sans-serif; }

/* ── 구분선 ── */
.card-divider-top {
  position: absolute; top: 220px; left: 40px; right: 40px;
  height: 1px; background: rgba(255,255,255,0.2); z-index: 10;
}

/* ── 왼쪽 특집 블록 영역 ── */
.card-features {
  position: absolute;
  top: 240px; left: 40px;
  z-index: 10;
  display: flex; flex-direction: column; gap: 28px;
  max-width: 420px;
}

/* 특집 블록 */
.feature-block { display: flex; flex-direction: column; gap: 5px; }
.feature-label {
  display: inline-block;
  background: rgba(200,20,20,0.92);
  padding: 3px 12px;
  font-size: 22px; font-weight: 900;
  letter-spacing: 0.06em;
  font-family: 'Noto Serif KR', serif;
  color: white;
  margin-bottom: 2px;
}
.feature-title {
  font-size: 48px; font-weight: 900; line-height: 1.1;
  letter-spacing: -0.01em;
  font-family: 'Noto Serif KR', serif;
  color: white;
  text-shadow: 1px 2px 8px rgba(0,0,0,0.6);
}
.feature-title span { display: block; }
.feature-subtitle {
  font-size: 22px; opacity: 0.7; line-height: 1.5;
  letter-spacing: 0.02em; font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
}

/* ── 오른쪽: 이달의 모델 라벨 ── */
.card-model-label {
  position: absolute;
  top: 410px; right: 50px;
  z-index: 10;
  text-align: right;
}
.model-heading {
  font-size: 26px; opacity: 0.75;
  letter-spacing: 0.12em;
  font-family: 'Bebas Neue', sans-serif;
}
.model-name-display {
  font-size: 22px; opacity: 0.55;
  letter-spacing: 0.06em;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  margin-top: 4px;
}

/* ── 왼쪽 세로 아이콘 + 크레딧 ── */
.card-left {
  position: absolute;
  left: 0; top: 0; bottom: 0; width: 56px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 36px; z-index: 10;
}
#subJobDisplay {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  margin-bottom: 18px;
}
.job-card-icon-sub { width: 36px; height: 36px; filter: invert(1); opacity: 0.7; }
.card-credit {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 12px; opacity: 0.3; letter-spacing: 0.05em;
  font-family: sans-serif; line-height: 1.4; white-space: nowrap;
}

/* ── 하단 바코드 + 크레딧 ── */
.card-bottom {
  position: absolute;
  bottom: 36px; left: 70px; right: 44px;
  display: flex; align-items: flex-end; justify-content: space-between;
  z-index: 10;
}
.bottom-info {
  font-size: 13px; opacity: 0.28; line-height: 1.8;
  letter-spacing: 0.03em; font-family: sans-serif;
}
.bottom-right-barcode {
  display: flex; flex-direction: column; align-items: flex-end; gap: 3px;
}
.bottom-barcode-svg { width: 110px; height: 34px; }
.design-credit {
  font-size: 13px; opacity: 0.32;
  letter-spacing: 0.04em; font-family: 'Bebas Neue', sans-serif;
}

/* ── 성향 태그 ── */
#cardTags {
  position: absolute; bottom: 110px; left: 70px;
  z-index: 10; display: flex; flex-wrap: wrap; gap: 6px;
}
.tag {
  border: 1px solid rgba(255,255,255,0.5);
  padding: 3px 12px; font-size: 15px;
  letter-spacing: 0.05em; font-family: sans-serif;
}

/* ── 메모 ── */
#cardMemo {
  position: absolute; bottom: 80px; left: 70px;
  font-size: 16px; opacity: 0.4;
  letter-spacing: 0.04em; font-family: sans-serif; z-index: 10;
}
</style>
</head>

<body>

<!-- ==========================================
     왼쪽 패널
========================================== -->
<div class="panel">
  <div class="panel-title">FF14 잡지 커버 카드 생성기</div>

  <div class="section">
    <h3>기본 정보</h3>
    <div class="field">
      <label>잡지 타이틀</label>
      <input type="text" id="titleInput" oninput="updateCard()" placeholder="ADVENTURE">
    </div>
    <div class="field">
      <label>날짜</label>
      <input type="text" id="dateInput" oninput="updateCard()" placeholder="APRIL 2026">
    </div>
    <div class="field">
      <label>오른쪽 라벨 (예: 이달의 모델)</label>
      <input type="text" id="modelLabelInput" oninput="updateCard()" placeholder="이달의 모델">
    </div>
    <div class="field">
      <label>오른쪽 부제 (예: 새벽의 모험가)</label>
      <input type="text" id="modelNameInput" oninput="updateCard()" placeholder="새벽의 모험가">
    </div>
    <div class="field">
      <label>서버</label>
      <select id="serverInput" onchange="updateCard()">
        <option value="">서버 선택</option>
        <optgroup label="Elemental">
          <option>Aegis</option><option>Atomos</option><option>Carbuncle</option>
          <option>Garuda</option><option>Gungnir</option><option>Kujata</option>
          <option>Tonberry</option><option>Typhon</option>
        </optgroup>
        <optgroup label="Gaia">
          <option>Alexander</option><option>Bahamut</option><option>Durandal</option>
          <option>Fenrir</option><option>Ifrit</option><option>Ridill</option>
          <option>Tiamat</option><option>Ultima</option>
        </optgroup>
        <optgroup label="Mana">
          <option>Anima</option><option>Asura</option><option>Chocobo</option>
          <option>Hades</option><option>Ixion</option><option>Masamune</option>
          <option>Pandaemonium</option><option>Titan</option>
        </optgroup>
        <optgroup label="Meteor">
          <option>Bismarck</option><option>Ravana</option><option>Sephirot</option>
          <option>Sophia</option><option>Zurvan</option>
        </optgroup>
      </select>
    </div>
  </div>

  <div class="section">
    <h3>특집 블록 1</h3>
    <div class="field">
      <label>라벨 (빨간 박스)</label>
      <input type="text" id="feat1LabelInput" oninput="updateCard()" placeholder="특종!">
    </div>
    <div class="field">
      <label>제목</label>
      <input type="text" id="feat1TitleInput" oninput="updateCard()" placeholder="모험을 돌 수 있는 시간은?">
    </div>
    <div class="field">
      <label>부내용 (줄바꿈 가능)</label>
      <textarea id="feat1SubInput" oninput="updateCard()" rows="2" placeholder="아침 점심 저녁 심야 새벽"></textarea>
    </div>
  </div>

  <div class="section">
    <h3>특집 블록 2</h3>
    <div class="field">
      <label>제목 (크게)</label>
      <input type="text" id="feat2TitleInput" oninput="updateCard()" placeholder="모험가,">
    </div>
    <div class="field">
      <label>부제</label>
      <input type="text" id="feat2SubtitleInput" oninput="updateCard()" placeholder="주로 무슨 일을 할까?">
    </div>
    <div class="field">
      <label>내용 (쉼표 구분)</label>
      <input type="text" id="feat2ContentInput" oninput="updateCard()" placeholder="하우징,레벨링,레이드,국민신">
    </div>
  </div>

  <div class="section">
    <h3>배경 이미지</h3>
    <input type="file" accept="image/*" onchange="loadBgImage(event)">
    <div style="font-size:9px; opacity:0.3; margin-top:4px;">업로드 후 드래그로 위치 조정</div>
  </div>

  <div class="section">
    <div class="job-section-header" onclick="toggleJobSection()">
      <span>보유 직업 (왼쪽 아이콘)</span>
      <span id="jobArrow" style="font-size:10px; opacity:0.4;">▼</span>
    </div>
    <div class="job-section-body" id="jobSectionBody">
      <div style="display:flex; gap:6px; margin:6px 0;">
        <button onclick="selectAllJobs()">전체 선택</button>
        <button onclick="clearJobs()">전체 해제</button>
      </div>
      <div id="jobSelect"></div>
    </div>
  </div>

  <div class="section">
    <h3>성향 태그</h3>
    <div class="field">
      <label>쉼표로 구분</label>
      <input type="text" id="tagInput" oninput="updateCard()" placeholder="밤샘러,공략파,하우저">
    </div>
  </div>

  <div class="section">
    <h3>메모 / 코멘트</h3>
    <div class="field">
      <input type="text" id="memoInput" oninput="updateCard()" placeholder="주접 코멘트...">
    </div>
  </div>

  <div class="section">
    <h3>디자인 크레딧</h3>
    <div class="field">
      <input type="text" id="designCreditInput" oninput="updateCard()" placeholder="Design @Dan_Fairy14">
    </div>
  </div>

  <div class="section">
    <button class="save-btn" onclick="saveImage()">이미지 저장</button>
  </div>
</div>


<!-- ==========================================
     미리보기
========================================== -->
<div class="preview-container">
  <div class="preview-wrapper" id="previewWrapper">
    <div class="card vertical" id="card">

      <!-- 배경 이미지 -->
      <img class="bg" id="bgImage" src="">
      <div class="card-overlay"></div>

      <!-- 상단: 날짜 + 바코드 -->
      <div class="card-top">
        <div class="card-date" id="cardDate">APRIL 2026</div>
        <div class="barcode-area">
          <svg class="barcode-svg" id="barcodeSvg" viewBox="0 0 90 32"></svg>
          <div class="barcode-label" id="barcodeLabel">FF14-PROFILE</div>
        </div>
      </div>

      <!-- 메인 타이틀 (배경 위 큰 글자) -->
      <div id="mainTitle">ADVENTURE</div>

      <!-- 상단 구분선 -->
      <div class="card-divider-top"></div>

      <!-- 왼쪽 특집 블록들 -->
      <div class="card-features" id="cardFeatures">
        <!-- JS로 렌더링 -->
      </div>

      <!-- 오른쪽 이달의 모델 -->
      <div class="card-model-label">
        <div class="model-heading" id="modelLabelDisplay">이달의 모델</div>
        <div class="model-name-display" id="modelNameDisplay">새벽의 모험가</div>
      </div>

      <!-- 왼쪽 세로: 직업 아이콘 + 저작권 -->
      <div class="card-left">
        <div id="subJobDisplay"></div>
        <div class="card-credit">ⓒ SQUARE ENIX · Published in Korea by ACTOZ SOFT CO., LTD · FINAL FANTASY XIV</div>
      </div>

      <!-- 성향 태그 -->
      <div id="cardTags"></div>

      <!-- 메모 -->
      <div id="cardMemo"></div>

      <!-- 하단 정보 + 바코드 -->
      <div class="card-bottom">
        <div class="bottom-info" id="bottomServerInfo"></div>
        <div class="bottom-right-barcode">
          <svg class="bottom-barcode-svg" id="bottomBarcodeSvg" viewBox="0 0 110 34"></svg>
          <div class="design-credit" id="designCreditDisplay">Design @Dan_Fairy14</div>
        </div>
      </div>

    </div>
  </div>
</div>


<script>
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  }
};

let selectedJobs = [];

function getAllJobsInOrder() {
  const all = [];
  Object.values(jobCategories).forEach(cat => {
    if (Array.isArray(cat)) all.push(...cat);
    else Object.values(cat).forEach(sub => all.push(...sub));
  });
  return all;
}

/* ── 카드 전체 업데이트 ── */
function updateCard() {
  // 타이틀
  document.getElementById("mainTitle").innerText =
    document.getElementById("titleInput").value || "ADVENTURE";

  // 날짜
  const dateVal = document.getElementById("dateInput").value;
  document.getElementById("cardDate").innerText =
    dateVal ? dateVal.toUpperCase() : getCurrentDate();

  // 오른쪽 모델 라벨
  document.getElementById("modelLabelDisplay").innerText =
    document.getElementById("modelLabelInput").value || "이달의 모델";
  document.getElementById("modelNameDisplay").innerText =
    document.getElementById("modelNameInput").value || "";

  // 서버
  const sv = document.getElementById("serverInput").value;
  document.getElementById("bottomServerInfo").innerHTML = sv
    ? `ⓒ SQUARE ENIX<br>Published in Korea by ACTOZ SOFT CO., LTD<br>${sv} Server`
    : `ⓒ SQUARE ENIX<br>Published in Korea by ACTOZ SOFT CO., LTD`;

  // 디자인 크레딧
  document.getElementById("designCreditDisplay").innerText =
    document.getElementById("designCreditInput").value || "Design @Dan_Fairy14";

  // 특집 블록
  renderFeatureBlocks();

  // 직업 아이콘
  const allJobs = getAllJobsInOrder();
  const subJobs = allJobs.filter(j => selectedJobs.includes(j));
  document.getElementById("subJobDisplay").innerHTML =
    subJobs.map(j =>
      `<img class="job-card-icon-sub" src="images/jobs/ffxivjobssvg_meteor/${j}.svg">`
    ).join("");

  // 태그
  document.getElementById("cardTags").innerHTML =
    (document.getElementById("tagInput").value || "")
      .split(",").map(t=>t.trim()).filter(t=>t)
      .map(t=>`<span class="tag">${t}</span>`).join("");

  // 메모
  document.getElementById("cardMemo").innerText =
    document.getElementById("memoInput").value || "";
}

function renderFeatureBlocks() {
  const feat1Label   = document.getElementById("feat1LabelInput").value.trim();
  const feat1Title   = document.getElementById("feat1TitleInput").value.trim();
  const feat1Sub     = document.getElementById("feat1SubInput").value.trim();
  const feat2Title   = document.getElementById("feat2TitleInput").value.trim();
  const feat2Sub     = document.getElementById("feat2SubtitleInput").value.trim();
  const feat2Content = document.getElementById("feat2ContentInput").value.trim();

  let html = "";

  // 블록 1
  if (feat1Label || feat1Title || feat1Sub) {
    html += `<div class="feature-block">`;
    if (feat1Label) html += `<div class="feature-label">${feat1Label}</div>`;
    if (feat1Title) html += `<div class="feature-subtitle" style="font-size:22px;opacity:0.65;">${feat1Title}</div>`;
    if (feat1Sub)   html += `<div class="feature-subtitle">${feat1Sub}</div>`;
    html += `</div>`;
  }

  // 블록 2
  if (feat2Title || feat2Sub || feat2Content) {
    html += `<div class="feature-block">`;
    if (feat2Title)   html += `<div class="feature-title"><span>${feat2Title}</span></div>`;
    if (feat2Sub)     html += `<div class="feature-subtitle" style="margin-top:6px;">${feat2Sub}</div>`;
    if (feat2Content) {
      const items = feat2Content.split(",").map(t=>t.trim()).filter(t=>t);
      html += `<div class="feature-subtitle" style="opacity:0.55;">${items.join(" · ")}</div>`;
    }
    html += `</div>`;
  }

  document.getElementById("cardFeatures").innerHTML = html;
}

function getCurrentDate() {
  const now = new Date();
  const months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
                  "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  return `${months[now.getMonth()]} ${now.getFullYear()}`;
}

function drawBarcode(svgId, w, h) {
  const svg = document.getElementById(svgId);
  const bars = 36;
  let html = "";
  for (let i = 0; i < bars; i++) {
    const x = (i/bars)*w;
    const bw = Math.random()<0.35 ? 2.2 : 1.0;
    const bh = Math.random()<0.18 ? h*0.65 : h*0.9;
    html += `<rect x="${x.toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="white" opacity="0.5"/>`;
  }
  svg.innerHTML = html;
}

function renderJobSelect() {
  let html = "";
  for (const category in jobCategories) {
    const data = jobCategories[category];
    html += `<div class="job-category"><div class="job-title">${category}</div>`;
    if (typeof data === "object" && !Array.isArray(data)) {
      for (const sub in data) {
        html += `<div class="job-subrow"><div class="job-subtitle">${sub}</div><div class="job-row">`;
        data[sub].forEach(job => {
          html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
        });
        html += `</div></div>`;
      }
    }
    html += `</div>`;
  }
  document.getElementById("jobSelect").innerHTML = html;
}

function toggleJob(job) {
  if (selectedJobs.includes(job)) {
    selectedJobs = selectedJobs.filter(j=>j!==job);
    document.getElementById(`icon-${job}`)?.classList.remove("selected");
  } else {
    selectedJobs.push(job);
    document.getElementById(`icon-${job}`)?.classList.add("selected");
  }
  updateCard();
}

function selectAllJobs() {
  selectedJobs = getAllJobsInOrder();
  document.querySelectorAll(".job-icon").forEach(el => el.classList.add("selected"));
  updateCard();
}
function clearJobs() {
  selectedJobs = [];
  document.querySelectorAll(".job-icon").forEach(el => el.classList.remove("selected"));
  updateCard();
}

function toggleJobSection() {
  const body = document.getElementById("jobSectionBody");
  const arrow = document.getElementById("jobArrow");
  body.classList.toggle("collapsed");
  arrow.innerText = body.classList.contains("collapsed") ? "▶" : "▼";
}

/* ── 배경 이미지 드래그 ── */
let bgPosX=50, bgPosY=50, isDragging=false, dragStartX, dragStartY;
function loadBgImage(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const bg = document.getElementById("bgImage");
    bg.src = e.target.result; bg.style.cursor = "grab";
    bg.removeEventListener("mousedown", startDrag);
    bg.addEventListener("mousedown", startDrag);
  };
  reader.readAsDataURL(file);
}
function startDrag(e) {
  isDragging=true; dragStartX=e.clientX; dragStartY=e.clientY;
  document.getElementById("bgImage").style.cursor="grabbing";
  document.addEventListener("mousemove",onDrag);
  document.addEventListener("mouseup",stopDrag);
}
function onDrag(e) {
  if (!isDragging) return;
  const card = document.getElementById("card");
  bgPosX = Math.min(100,Math.max(0,bgPosX-(e.clientX-dragStartX)/card.offsetWidth*100));
  bgPosY = Math.min(100,Math.max(0,bgPosY-(e.clientY-dragStartY)/card.offsetHeight*100));
  document.getElementById("bgImage").style.objectPosition=`${bgPosX}% ${bgPosY}%`;
  dragStartX=e.clientX; dragStartY=e.clientY;
}
function stopDrag() {
  isDragging=false; document.getElementById("bgImage").style.cursor="grab";
  document.removeEventListener("mousemove",onDrag);
  document.removeEventListener("mouseup",stopDrag);
}

/* ── 레이아웃 / 피팅 ── */
function fitPreview() {
  const card = document.getElementById("card");
  const container = document.querySelector(".preview-container");
  const wrapper = document.getElementById("previewWrapper");
  const cw = container.clientWidth-40, ch = container.clientHeight-40;
  const cardW = card.classList.contains("vertical") ? 1080 : 1920;
  const cardH = card.classList.contains("vertical") ? 1920 : 1080;
  const scale = Math.min(cw/cardW, ch/cardH);
  wrapper.style.transform = `scale(${scale})`;
  wrapper.style.width = cardW+"px";
  wrapper.style.height = cardH+"px";
}

function saveImage() {
  html2canvas(document.getElementById("card"), {scale:2}).then(canvas => {
    const link = document.createElement("a");
    link.download = "ff14_card.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}

/* ── 초기화 ── */
renderJobSelect();
drawBarcode("barcodeSvg", 90, 32);
drawBarcode("bottomBarcodeSvg", 110, 34);
document.getElementById("cardDate").innerText = getCurrentDate();
updateCard();
fitPreview();
window.addEventListener("resize", fitPreview);
</script>
