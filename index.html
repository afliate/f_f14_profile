<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>FF14 잡지 커버 카드 생성기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500&family=Black+Han+Sans&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  color: white;
  font-family: 'Noto Sans KR', sans-serif;
  display: flex;
  height: 100vh;
  overflow: hidden;
}

/* ══════ 패널 ══════ */
.panel {
  width: 250px; min-width: 250px;
  background: #0e0e0e;
  border-right: 1px solid #1e1e1e;
  height: 100vh;
  display: flex; flex-direction: column;
  font-family: sans-serif;
}
.panel-title {
  font-size: 10px; padding: 12px 14px 8px;
  opacity: 0.4; letter-spacing: 0.1em;
  text-transform: uppercase;
  border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.tab-bar {
  display: flex; flex-wrap: wrap; gap: 2px;
  padding: 8px 8px 4px;
  border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.tab-btn {
  padding: 4px 9px; background: #1a1a1a;
  border: 1px solid #2a2a2a; color: rgba(255,255,255,0.45);
  cursor: pointer; font-size: 10px; letter-spacing: 0.05em;
  font-family: sans-serif; transition: all 0.15s;
}
.tab-btn:hover { background: #242424; color: rgba(255,255,255,0.7); }
.tab-btn.active { background: white; color: black; border-color: white; }
.tab-content { display: none; flex: 1; overflow-y: auto; padding: 12px 14px; }
.tab-content.active { display: block; }
.section { margin-bottom: 14px; padding-bottom: 14px; border-bottom: 1px solid #1e1e1e; }
.section:last-child { border-bottom: none; }
.section h3 { font-size: 10px; opacity: 0.4; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.08em; }
.field { display: flex; flex-direction: column; gap: 3px; margin-bottom: 7px; }
.field label { font-size: 10px; opacity: 0.5; }
.field input[type="text"],
.field textarea,
.field select {
  width: 100%; padding: 5px 7px;
  background: #1a1a1a; border: 1px solid #2a2a2a;
  color: white; font-size: 12px; font-family: sans-serif; resize: vertical;
}
.field select option { background: #1a1a1a; }
input[type="file"] { font-size: 11px; color: #888; width: 100%; }
.job-category { margin-bottom: 10px; }
.job-cat-title { font-size: 10px; opacity: 0.4; margin-bottom: 5px; }
.job-subrow { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.job-subtitle { width: 34px; font-size: 9px; opacity: 0.4; flex-shrink: 0; }
.job-row { display: flex; flex-wrap: wrap; gap: 3px; }
.job-icon { width: 24px; height: 24px; cursor: pointer; filter: invert(1); opacity: 0.3; transition: opacity 0.1s; }
.job-icon:hover { opacity: 0.7; }
.job-icon.selected { opacity: 1; outline: 1px solid rgba(255,255,255,0.6); outline-offset: 1px; }
.main-job-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.mj-icon { width: 26px; height: 26px; cursor: pointer; filter: invert(1); opacity: 0.3; transition: opacity 0.1s; }
.mj-icon:hover { opacity: 0.7; }
.mj-icon.selected { opacity: 1; outline: 2px solid #f5c518; outline-offset: 1px; }
.lineart-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
.la-icon { width: 24px; height: 24px; cursor: pointer; filter: invert(1); opacity: 0.3; transition: opacity 0.1s; }
.la-icon:hover { opacity: 0.7; }
.la-icon.selected { opacity: 1; outline: 1px solid white; outline-offset: 1px; }
.btn-row { display: flex; gap: 6px; margin: 6px 0; }
.small-btn { flex: 1; padding: 5px; background: #1a1a1a; border: 1px solid #333; color: white; cursor: pointer; font-size: 10px; }
.small-btn:hover { background: #252525; }
.save-btn { width: 100%; padding: 9px; background: #1a1a1a; border: 1px solid #444; color: white; cursor: pointer; font-size: 12px; margin-top: 6px; }
.save-btn:hover { background: #2a2a2a; }

/* ══════ 미리보기 ══════ */
.preview-container {
  flex: 1; display: flex; justify-content: center; align-items: flex-start;
  overflow: hidden; padding: 20px; background: #0a0a0a;
}
.preview-wrapper { transform-origin: top center; }

/* ══════ 카드 ══════ */
.card {
  position: relative; overflow: hidden;
  background: #0a0510; font-family: 'Noto Sans KR', sans-serif;
  width: 1080px; height: 1920px;
}
.card .bg {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center top; z-index: 0;
}
.card-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to bottom,
    rgba(0,0,0,0.38) 0%, rgba(0,0,0,0.05) 20%, transparent 40%,
    rgba(0,0,0,0.42) 68%, rgba(0,0,0,0.84) 100%);
  z-index: 1; pointer-events: none;
}

/* 메인 타이틀 — 가운데 */
#mainTitle {
  position: absolute; top: 0; left: 0; right: 0;
  text-align: center; padding-top: 14px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 230px; line-height: 0.88; letter-spacing: 6px;
  color: white; opacity: 0.9; z-index: 10;
  pointer-events: none; user-select: none;
  text-shadow: 2px 4px 24px rgba(0,0,0,0.55);
}

/* 상단 바코드 (오른쪽만) */
.card-top {
  position: absolute; top: 0; right: 0; height: 90px;
  display: flex; align-items: flex-start;
  padding: 28px 44px 0; z-index: 12;
}
.barcode-area { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.barcode-svg { width: 90px; height: 32px; }
.barcode-label { font-size: 13px; opacity: 0.35; letter-spacing: 0.08em; font-family: 'Bebas Neue', sans-serif; }

/* 구분선 */
.card-divider-top {
  position: absolute; top: 215px; left: 56px; right: 40px;
  height: 1px; background: rgba(255,255,255,0.18); z-index: 10;
}

/* 왼쪽 특집 블록 */
.card-features-left {
  position: absolute; top: 234px; left: 70px;
  z-index: 10; display: flex; flex-direction: column; gap: 30px;
  max-width: 440px;
}

/* 오른쪽 특집 블록 */
.card-features-right {
  position: absolute; top: 234px; right: 48px;
  z-index: 10; display: flex; flex-direction: column; gap: 16px;
  max-width: 280px; text-align: right; align-items: flex-end;
}

.feature-block { display: flex; flex-direction: column; gap: 4px; }

/* 특집 라벨 — Black Han Sans 적용 */
.feature-label {
  display: inline-block;
  background: rgba(200,20,20,0.92);
  padding: 3px 12px;
  font-size: 22px; font-weight: 700;
  letter-spacing: 0.08em;
  font-family: 'Black Han Sans', 'Noto Sans KR', sans-serif;
  color: white; margin-bottom: 3px;
}
.feature-title {
  font-size: 54px; font-weight: 900; line-height: 1.05;
  font-family: 'Black Han Sans', sans-serif;
  color: white; text-shadow: 1px 2px 10px rgba(0,0,0,0.65);
}
.feature-subtitle {
  font-size: 20px; opacity: 0.68; line-height: 1.55;
  font-family: 'Noto Sans KR', sans-serif; font-weight: 300;
}
.feature-content-list {
  font-size: 19px; opacity: 0.5; line-height: 1.5;
  font-family: 'Noto Sans KR', sans-serif;
}
.card-features-right .feature-label { font-size: 18px; padding: 2px 10px; }
.card-features-right .feature-title { font-size: 36px; }
.card-features-right .feature-subtitle { font-size: 17px; }

/* 왼쪽 세로: 잡 아이콘 + 출처 */
.card-left {
  position: absolute; left: 0; top: 0; bottom: 0; width: 58px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding-bottom: 40px; z-index: 10;
}
.card-left-jobs {
  display: flex; flex-direction: column; align-items: center;
  gap: 0; margin-bottom: 12px;
}
.left-job-row { display: flex; gap: 0; }
.job-card-icon-sub { width: 26px; height: 26px; filter: invert(1); opacity: 0.72; }
.card-credit {
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: 11px; opacity: 0.28; letter-spacing: 0.05em;
  font-family: sans-serif; line-height: 1.3; white-space: nowrap;
}

/* 라인아트 — 하단 중앙, 불투명도 70% */
#lineArt {
  position: absolute; bottom: -60px; left: 50%; transform: translateX(-50%);
  width: 680px; height: 680px; object-fit: contain;
  opacity: 0.7; filter: invert(1);
  z-index: 5; pointer-events: none; display: none;
}

/* 서버 */
#serverDisplay {
  position: absolute; bottom: 130px; right: 50px;
  font-size: 20px; opacity: 0.45;
  letter-spacing: 0.1em; font-family: 'Bebas Neue', sans-serif; z-index: 10;
}

/* 태그 */
#cardTags {
  position: absolute; bottom: 78px; left: 70px;
  z-index: 10; display: flex; flex-wrap: wrap; gap: 6px;
}
.tag { border: 1px solid rgba(255,255,255,0.5); padding: 3px 12px; font-size: 15px; letter-spacing: 0.04em; font-family: sans-serif; }

/* 메모 */
#cardMemo {
  position: absolute; bottom: 44px; left: 70px;
  font-size: 15px; opacity: 0.38;
  letter-spacing: 0.04em; font-family: sans-serif; z-index: 10;
}
</style>
</head>
<body>

<div class="panel">
  <div class="panel-title">FF14 잡지 커버 카드 생성기</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('tab-basic',this)">기본</button>
    <button class="tab-btn" onclick="switchTab('tab-feat',this)">특집</button>
    <button class="tab-btn" onclick="switchTab('tab-jobs',this)">직업</button>
    <button class="tab-btn" onclick="switchTab('tab-bg',this)">배경</button>
    <button class="tab-btn" onclick="switchTab('tab-etc',this)">기타</button>
  </div>

  <!-- 기본 탭 -->
  <div class="tab-content active" id="tab-basic">
    <div class="section">
      <h3>잡지 타이틀</h3>
      <div class="field">
        <input type="text" id="titleInput" oninput="updateCard()" placeholder="EORZEAN">
      </div>
    </div>
    <div class="section">
      <h3>서버</h3>
      <div class="field">
        <select id="serverInput" onchange="updateCard()">
          <option value="">선택 안 함</option>
          <option>카벙클</option>
          <option>초코보</option>
          <option>모그리</option>
          <option>톤베리</option>
          <option>펜리르</option>
        </select>
      </div>
    </div>
    <div class="section">
      <h3>성향 태그</h3>
      <div class="field">
        <label>쉼표로 구분</label>
        <input type="text" id="tagInput" oninput="updateCard()" placeholder="밤샘러,공략파,하우저">
      </div>
    </div>
    <div class="section">
      <h3>메모</h3>
      <div class="field">
        <input type="text" id="memoInput" oninput="updateCard()" placeholder="코멘트...">
      </div>
    </div>
    <button class="save-btn" onclick="saveImage()">💾 이미지 저장</button>
  </div>

  <!-- 특집 탭 -->
  <div class="tab-content" id="tab-feat">
    <div class="section">
      <h3>왼쪽 블록 1</h3>
      <div class="field"><label>라벨 (빨간 박스)</label><input type="text" id="f1label" oninput="updateCard()" placeholder="특종!"></div>
      <div class="field"><label>제목</label><input type="text" id="f1title" oninput="updateCard()" placeholder="모험을 돌 수 있는 시간은?"></div>
      <div class="field"><label>내용</label><textarea id="f1sub" oninput="updateCard()" rows="2" placeholder="아침 점심 저녁 심야 새벽"></textarea></div>
    </div>
    <div class="section">
      <h3>왼쪽 블록 2</h3>
      <div class="field"><label>라벨</label><input type="text" id="f2label" oninput="updateCard()" placeholder=""></div>
      <div class="field"><label>큰 제목</label><input type="text" id="f2title" oninput="updateCard()" placeholder="모험가,"></div>
      <div class="field"><label>부제</label><input type="text" id="f2sub" oninput="updateCard()" placeholder="주로 무슨 일을 할까?"></div>
      <div class="field"><label>내용 (쉼표 구분)</label><input type="text" id="f2content" oninput="updateCard()" placeholder="하우징,레벨링,레이드"></div>
    </div>
    <div class="section">
      <h3>오른쪽 블록</h3>
      <div class="field"><label>라벨</label><input type="text" id="f3label" oninput="updateCard()" placeholder="이달의 모델"></div>
      <div class="field"><label>제목</label><input type="text" id="f3title" oninput="updateCard()" placeholder="새벽의 모험가"></div>
      <div class="field"><label>부내용</label><textarea id="f3sub" oninput="updateCard()" rows="2" placeholder="추가 설명..."></textarea></div>
    </div>
  </div>

  <!-- 직업 탭 -->
  <div class="tab-content" id="tab-jobs">
    <div class="section">
      <h3>메인 직업 (노란 테두리)</h3>
      <div style="font-size:9px;opacity:0.35;margin-bottom:6px;">클릭 선택 / 다시 클릭 해제</div>
      <div class="main-job-grid" id="mainJobSelect"></div>
    </div>
    <div class="section">
      <h3>보유 직업 (왼쪽 아이콘)</h3>
      <div class="btn-row">
        <button class="small-btn" onclick="selectAllJobs()">전체 선택</button>
        <button class="small-btn" onclick="clearJobs()">전체 해제</button>
      </div>
      <div id="jobSelect"></div>
    </div>
  </div>

  <!-- 배경 탭 -->
  <div class="tab-content" id="tab-bg">
    <div class="section">
      <h3>배경 이미지</h3>
      <input type="file" accept="image/*" onchange="loadBgImage(event)">
      <div style="font-size:9px;opacity:0.3;margin-top:5px;">업로드 후 드래그로 위치 조정</div>
    </div>
    <div class="section">
      <h3>라인아트 (메인 직업)</h3>
      <div style="font-size:9px;opacity:0.3;margin-bottom:6px;">하단 중앙 · 불투명도 70%</div>
      <div class="lineart-grid" id="lineArtSelect"></div>
      <div class="btn-row" style="margin-top:8px;">
        <button class="small-btn" onclick="clearLineArt()">라인아트 제거</button>
      </div>
    </div>
  </div>

  <!-- 기타 탭 -->
  <div class="tab-content" id="tab-etc">
    <div class="section">
      <h3>날짜 (자동)</h3>
      <div style="font-size:13px;opacity:0.6;padding:4px 0;" id="currentDateDisplay"></div>
      <div style="font-size:9px;opacity:0.3;margin-top:4px;">현재 월/연도 자동 표시됩니다.</div>
    </div>
    <button class="save-btn" onclick="saveImage()">💾 이미지 저장</button>
  </div>
</div>

<!-- 미리보기 -->
<div class="preview-container">
  <div class="preview-wrapper" id="previewWrapper">
    <div class="card" id="card">

      <img class="bg" id="bgImage" src="">
      <div class="card-overlay"></div>

      <!-- 상단 바코드 (오른쪽) -->
      <div class="card-top">
        <div class="barcode-area">
          <svg class="barcode-svg" id="barcodeSvg" viewBox="0 0 90 32"></svg>
          <div class="barcode-label" id="barcodeLabel">EORZEAN</div>
        </div>
      </div>

      <!-- 타이틀 (가운데) -->
      <div id="mainTitle">EORZEAN</div>

      <!-- 구분선 -->
      <div class="card-divider-top"></div>

      <!-- 라인아트 (하단 배경) -->
      <img id="lineArt" src="">

      <!-- 왼쪽 특집 -->
      <div class="card-features-left" id="featLeft"></div>

      <!-- 오른쪽 특집 -->
      <div class="card-features-right" id="featRight"></div>

      <!-- 왼쪽: 직업 아이콘 + 출처 -->
      <div class="card-left">
        <div class="card-left-jobs" id="subJobDisplay"></div>
        <div class="card-credit">ⓒ SQUARE ENIX · Published in Korea by ACTOZ SOFT CO., LTD · FINAL FANTASY XIV</div>
      </div>

      <!-- 서버 -->
      <div id="serverDisplay"></div>

      <!-- 태그 -->
      <div id="cardTags"></div>

      <!-- 메모 -->
      <div id="cardMemo"></div>

    </div>
  </div>
</div>

<script>
const jobCategories = {
  "전투": {
    "탱커": ["pld","war","drk","gnb"],
    "힐러": ["whm","sch","ast","sge"],
    "근딜": ["mnk","drg","nin","sam","rpr","vpr"],
    "원딜": ["brd","mch","dnc"],
    "마딜": ["blm","smn","rdm","pct","blu"]
  }
};

let selectedJobs = [], mainJob = null;

function getAllJobs() {
  const all = [];
  Object.values(jobCategories).forEach(cat => Object.values(cat).forEach(arr => all.push(...arr)));
  return all;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

function getCurrentDate() {
  const now = new Date();
  const months = ["JANUARY","FEBRUARY","MARCH","APRIL","MAY","JUNE",
                  "JULY","AUGUST","SEPTEMBER","OCTOBER","NOVEMBER","DECEMBER"];
  return `${months[now.getMonth()]} ${now.getFullYear()}`;
}

function updateCard() {
  document.getElementById("mainTitle").innerText =
    (document.getElementById("titleInput").value || "EORZEAN").toUpperCase();
  document.getElementById("barcodeLabel").innerText =
    (document.getElementById("titleInput").value || "EORZEAN").toUpperCase().slice(0,10);

  const sv = document.getElementById("serverInput").value;
  document.getElementById("serverDisplay").innerText = sv ? sv + " SERVER" : "";

  renderFeatLeft();
  renderFeatRight();

  document.getElementById("cardTags").innerHTML =
    (document.getElementById("tagInput").value || "")
      .split(",").map(t=>t.trim()).filter(t=>t)
      .map(t=>`<span class="tag">${t}</span>`).join("");

  document.getElementById("cardMemo").innerText =
    document.getElementById("memoInput").value || "";
}

function renderFeatLeft() {
  let html = "";
  const l1=document.getElementById("f1label").value.trim();
  const t1=document.getElementById("f1title").value.trim();
  const s1=document.getElementById("f1sub").value.trim();
  if (l1||t1||s1) {
    html += `<div class="feature-block">`;
    if (l1) html += `<div class="feature-label">${l1}</div>`;
    if (t1) html += `<div class="feature-subtitle" style="font-size:21px;opacity:0.65;margin-top:2px;">${t1}</div>`;
    if (s1) html += `<div class="feature-subtitle">${s1.replace(/\n/g,'<br>')}</div>`;
    html += `</div>`;
  }
  const l2=document.getElementById("f2label").value.trim();
  const t2=document.getElementById("f2title").value.trim();
  const s2=document.getElementById("f2sub").value.trim();
  const c2=document.getElementById("f2content").value.trim();
  if (l2||t2||s2||c2) {
    html += `<div class="feature-block">`;
    if (l2) html += `<div class="feature-label">${l2}</div>`;
    if (t2) html += `<div class="feature-title">${t2}</div>`;
    if (s2) html += `<div class="feature-subtitle" style="margin-top:5px;">${s2}</div>`;
    if (c2) {
      const items = c2.split(",").map(x=>x.trim()).filter(x=>x);
      html += `<div class="feature-content-list">${items.join(" · ")}</div>`;
    }
    html += `</div>`;
  }
  document.getElementById("featLeft").innerHTML = html;
}

function renderFeatRight() {
  let html = "";
  const l3=document.getElementById("f3label").value.trim();
  const t3=document.getElementById("f3title").value.trim();
  const s3=document.getElementById("f3sub").value.trim();
  if (l3||t3||s3) {
    if (l3) html += `<div class="feature-label">${l3}</div>`;
    if (t3) html += `<div class="feature-title" style="font-size:38px;margin-top:4px;">${t3}</div>`;
    if (s3) html += `<div class="feature-subtitle" style="margin-top:6px;">${s3.replace(/\n/g,'<br>')}</div>`;
  }
  document.getElementById("featRight").innerHTML = html;
}

function drawBarcode(svgId, w, h) {
  const svg = document.getElementById(svgId); let html = "";
  for (let i=0;i<36;i++) {
    const x=(i/36)*w, bw=Math.random()<0.35?2.2:1.0, bh=Math.random()<0.18?h*0.65:h*0.9;
    html+=`<rect x="${x.toFixed(1)}" y="${(h-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" fill="white" opacity="0.5"/>`;
  }
  svg.innerHTML = html;
}

function renderJobSelect() {
  let html = "";
  for (const cat in jobCategories) {
    html += `<div class="job-category"><div class="job-cat-title">${cat}</div>`;
    for (const sub in jobCategories[cat]) {
      html += `<div class="job-subrow"><div class="job-subtitle">${sub}</div><div class="job-row">`;
      jobCategories[cat][sub].forEach(job => {
        html += `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="job-icon" id="icon-${job}" onclick="toggleJob('${job}')" title="${job}">`;
      });
      html += `</div></div>`;
    }
    html += `</div>`;
  }
  document.getElementById("jobSelect").innerHTML = html;
}

function renderMainJobSelect() {
  document.getElementById("mainJobSelect").innerHTML =
    getAllJobs().map(job =>
      `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="mj-icon" id="mjs-${job}" onclick="setMainJob('${job}')" title="${job}">`
    ).join("");
}

function setMainJob(job) {
  mainJob = (mainJob===job) ? null : job;
  document.querySelectorAll(".mj-icon").forEach(el=>el.classList.remove("selected"));
  if (mainJob) document.getElementById(`mjs-${mainJob}`)?.classList.add("selected");
  renderSubJobDisplay();
}

function toggleJob(job) {
  if (selectedJobs.includes(job)) {
    selectedJobs = selectedJobs.filter(j=>j!==job);
    document.getElementById(`icon-${job}`)?.classList.remove("selected");
    if (mainJob===job) { mainJob=null; document.querySelectorAll(".mj-icon").forEach(el=>el.classList.remove("selected")); }
  } else {
    selectedJobs.push(job);
    document.getElementById(`icon-${job}`)?.classList.add("selected");
  }
  renderSubJobDisplay();
}

function renderSubJobDisplay() {
  const allJobs = getAllJobs();
  const mj = mainJob ? [mainJob] : [];
  const rest = allJobs.filter(j=>selectedJobs.includes(j) && j!==mainJob);
  const display = [...mj, ...rest];
  let html = "";
  for (let i=0;i<display.length;i+=2) {
    html += `<div class="left-job-row">`;
    const styleMain = `filter:invert(1) drop-shadow(0 0 4px #f5c518);opacity:1;`;
    const styleNorm = ``;
    html += `<img class="job-card-icon-sub" src="images/jobs/ffxivjobssvg_meteor/${display[i]}.svg" style="${display[i]===mainJob?styleMain:styleNorm}">`;
    if (display[i+1]) html += `<img class="job-card-icon-sub" src="images/jobs/ffxivjobssvg_meteor/${display[i+1]}.svg" style="${display[i+1]===mainJob?styleMain:styleNorm}">`;
    html += `</div>`;
  }
  document.getElementById("subJobDisplay").innerHTML = html;
}

function selectAllJobs() {
  selectedJobs = getAllJobs();
  document.querySelectorAll(".job-icon").forEach(el=>el.classList.add("selected"));
  renderSubJobDisplay();
}
function clearJobs() {
  selectedJobs=[]; mainJob=null;
  document.querySelectorAll(".job-icon").forEach(el=>el.classList.remove("selected"));
  document.querySelectorAll(".mj-icon").forEach(el=>el.classList.remove("selected"));
  renderSubJobDisplay();
}

function renderLineArtSelect() {
  document.getElementById("lineArtSelect").innerHTML =
    getAllJobs().map(job =>
      `<img src="images/jobs/ffxivjobssvg/${job}.svg" class="la-icon" id="la-${job}" onclick="setLineArt('${job}')" title="${job}">`
    ).join("");
}
function setLineArt(job) {
  const la = document.getElementById("lineArt");
  la.src = `images/jobs/CL/${job.toUpperCase()}.png`;
  la.style.display = "block";
  document.querySelectorAll(".la-icon").forEach(el=>el.classList.remove("selected"));
  document.getElementById(`la-${job}`)?.classList.add("selected");
}
function clearLineArt() {
  const la = document.getElementById("lineArt");
  la.style.display="none"; la.src="";
  document.querySelectorAll(".la-icon").forEach(el=>el.classList.remove("selected"));
}

let bgPosX=50, bgPosY=50, isDragging=false, dragStartX, dragStartY;
function loadBgImage(event) {
  const file=event.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const bg=document.getElementById("bgImage");
    bg.src=e.target.result; bg.style.cursor="grab";
    bg.removeEventListener("mousedown",startDrag);
    bg.addEventListener("mousedown",startDrag);
  };
  reader.readAsDataURL(file);
}
function startDrag(e) {
  isDragging=true; dragStartX=e.clientX; dragStartY=e.clientY;
  document.getElementById("bgImage").style.cursor="grabbing";
  document.addEventListener("mousemove",onDrag);
  document.addEventListener("mouseup",stopDrag);
}
function onDrag(e) {
  if(!isDragging) return;
  const card=document.getElementById("card");
  bgPosX=Math.min(100,Math.max(0,bgPosX-(e.clientX-dragStartX)/card.offsetWidth*100));
  bgPosY=Math.min(100,Math.max(0,bgPosY-(e.clientY-dragStartY)/card.offsetHeight*100));
  document.getElementById("bgImage").style.objectPosition=`${bgPosX}% ${bgPosY}%`;
  dragStartX=e.clientX; dragStartY=e.clientY;
}
function stopDrag() {
  isDragging=false; document.getElementById("bgImage").style.cursor="grab";
  document.removeEventListener("mousemove",onDrag);
  document.removeEventListener("mouseup",stopDrag);
}

function fitPreview() {
  const container=document.querySelector(".preview-container");
  const wrapper=document.getElementById("previewWrapper");
  const cw=container.clientWidth-40, ch=container.clientHeight-40;
  const scale=Math.min(cw/1080, ch/1920);
  wrapper.style.transform=`scale(${scale})`;
  wrapper.style.width="1080px"; wrapper.style.height="1920px";
}
function saveImage() {
  html2canvas(document.getElementById("card"),{scale:2}).then(canvas=>{
    const link=document.createElement("a");
    link.download="ff14_card.png"; link.href=canvas.toDataURL(); link.click();
  });
}

renderJobSelect();
renderMainJobSelect();
renderLineArtSelect();
drawBarcode("barcodeSvg",90,32);
document.getElementById("currentDateDisplay").innerText = getCurrentDate();
updateCard();
fitPreview();
window.addEventListener("resize",fitPreview);
</script>
