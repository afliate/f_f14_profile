<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>My Character</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: sans-serif;
    }

    .card {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.5);
    }

    .content {
      position: absolute;
      bottom: 50px;
      left: 50px;
    }

    h1 {
      font-size: 60px;
      margin: 0;
    }

    .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border: 1px solid white;
      border-radius: 50%;
      margin-right: 5px;
    }

    .filled {
      background: white;
    }

    .tag {
      display: inline-block;
      border: 1px solid white;
      padding: 5px 10px;
      margin-right: 5px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <img class="bg" src="character.jpg">

  <div class="content">
    <h1>내 캐릭터</h1>

    <div>
      전투:
      <span class="dot filled"></span>
      <span class="dot filled"></span>
      <span class="dot filled"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>

    <div>
      <span class="tag">RT</span>
      <span class="tag">BL</span>
    </div>
  </div>
</div>

</body>
</html>
